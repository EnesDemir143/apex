apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
images:
  - name: ghcr.io/enesdemir143/apex
    newName: apex
    newTag: local
patches:
  - target:
      kind: Ingress
      name: apex
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: apex.local
  - target:
      kind: Deployment
      name: apex-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: apex-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
