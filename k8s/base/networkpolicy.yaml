apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-default-deny-ingress
  namespace: apex
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-allow-frontend-to-api
  namespace: apex
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: apex-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: apex-frontend
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-allow-ingress-to-frontend
  namespace: apex
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: apex-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8501
