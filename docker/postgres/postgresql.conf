# Apex PostgreSQL Configuration — Development Defaults
# Tuned for local Docker dev environment (not production)

# Connection
listen_addresses = '*'
port = 5432
max_connections = 100

# Memory (dev: moderate values, bump in prod)
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 128MB

# WAL (Write-Ahead Log)
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# Query Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging
log_timezone = 'UTC'
log_statement = 'mod'
log_min_duration_statement = 250
log_line_prefix = '%m [%p] %q%u@%d '

# Locale
timezone = 'UTC'
datestyle = 'iso, mdy'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# pgvector: enable parallel index builds
max_parallel_maintenance_workers = 2
max_parallel_workers_per_gather = 2
