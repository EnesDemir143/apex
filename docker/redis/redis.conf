# Apex Redis 8 Configuration — Development Defaults
# Redis 8 bundles all modules natively (RediSearch, RedisJSON, RedisTimeSeries)

# Network
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Persistence — AOF (Append Only File)
appendonly yes
appendfsync everysec
appenddirname "appendonlydir"
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Snapshotting (RDB) — complement to AOF
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb

# Performance
hz 10
dynamic-hz yes
