# Apex Development Stack
# Usage: docker compose -f docker-compose.dev.yml up -d
# Docker Compose v2 — no version key needed

services:
  # ─── PostgreSQL 17 + pgvector ───
  postgres:
    image: pgvector/pgvector:pg17
    container_name: apex-postgres
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex}
      POSTGRES_DB: apex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - apex-net
    restart: unless-stopped

  # ─── Redis 8 (modules bundled: RediSearch, RedisJSON, RedisTimeSeries) ───
  redis:
    image: redis:8-alpine
    container_name: apex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - apex-net
    restart: unless-stopped

  # ─── RedisInsight (Web GUI for Redis) ───
  redisinsight:
    image: redis/redisinsight:2.68
    container_name: apex-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apex-net
    restart: unless-stopped

  # ─── Loki (Log Aggregation) ───
  loki:
    image: grafana/loki:3.4.0
    container_name: apex-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/observability/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=/dev/null http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - apex-net
    restart: unless-stopped

  # ─── Promtail (Log Shipping) ───
  promtail:
    image: grafana/promtail:3.4.0
    container_name: apex-promtail
    volumes:
      - ./docker/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - apex-net
    restart: unless-stopped

  # ─── Grafana (Dashboards & Visualization) ───
  grafana:
    image: grafana/grafana:11.6.0
    container_name: apex-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=/dev/null http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - apex-net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local

networks:
  apex-net:
    driver: bridge
